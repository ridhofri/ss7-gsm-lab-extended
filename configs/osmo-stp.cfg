log stderr
 logging filter all 1
 logging color 1
 logging print category 1
 logging level set-all notice

stats interval 5

line vty
 no login

cs7 instance 0
 point-code 0.23.0

 # Listen for M3UA clients (MSC, BSC, etc.) on localhost:2906
 listen m3ua 2906
  accept-asp-connections dynamic-permitted

 # Allow dynamic routing key management
 xua rkm routing-key-allocation dynamic-permitted

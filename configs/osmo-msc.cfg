log stderr
 logging filter all 1
 logging color 1
 logging print category 1
 logging level set-all info

stats interval 5

line vty
 no login

cs7 instance 0
 point-code 0.23.2

 # ASP to STP (server on 127.0.0.1:2906). Do NOT put a 'role' keyword here on v1.13.x.
 asp asp-clnt-msc 2906 0 m3ua
  remote-ip 127.0.0.1
  local-ip  127.0.0.1
  role asp
  role asp
  role asp
  sctp-role client
  no shutdown

 as as-clnt-msc m3ua
  asp asp-clnt-msc
  traffic-mode override
  routing-key 0 0.23.2 si sccp ssn 254

network
 network country code 001
 mobile network code 01
 short name OsmoMSC
 long name OsmoMSC
 encryption a5 1 3
 encryption uea 1 2
 authentication optional
 rrlp mode none
 mm info 0

 mgw 0
  local-ip 127.0.0.1
  remote-ip 127.0.0.1

msc
 assign-tmsi
 mncc internal
 cs7-instance-a 0

mncc-int
 default-codec tch-f fr
 default-codec tch-h hr

hlr
 remote-ip 127.0.0.1
 remote-port 4222
 ipa-name unnamed-msc

smsc
 queue max-pending 20
